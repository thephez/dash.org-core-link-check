name: Dash Core Download Links Check

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to test with (chromium, firefox, webkit, all)'
        required: false
        default: 'chromium'
        type: choice
        options:
        - chromium
        - all
        - firefox
        - webkit
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ github.event.inputs.browser == 'all' && fromJSON('["chromium", "firefox", "webkit"]') || github.event.inputs.browser && fromJSON(format('["{0}"]', github.event.inputs.browser)) || fromJSON('["chromium"]') }}
    
    name: Test on ${{ matrix.browser }}
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-browsers-${{ runner.os }}

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Run Playwright tests
      run: npx playwright test --project=${{ matrix.browser }}
      env:
        CI: true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.browser }}
        path: test-results/
        retention-days: 30

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-html-report-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30

  report:
    if: always()
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Generate summary report
      run: |
        echo "# Dash Core Download Links Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Process each results file
        for file in artifacts/*/results.json; do
          if [ -f "$file" ]; then
            BROWSER=$(echo "$file" | sed -n 's/.*playwright-report-\([^/]*\).*/\1/p')
            TOTAL_TESTS=$(jq '.stats.expected + .stats.unexpected + .stats.flaky' "$file")
            PASSED_TESTS=$(jq '.stats.expected' "$file")
            FAILED_TESTS=$(jq '.stats.unexpected' "$file")
            
            echo "## $BROWSER Results" >> $GITHUB_STEP_SUMMARY
            echo "**Tests:** $PASSED_TESTS/$TOTAL_TESTS passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Extract validation report from test output
            echo "### Dash.org Validation Report" >> $GITHUB_STEP_SUMMARY
            
            # Get latest version and currency status
            LATEST_VERSION=$(jq -r '.suites[0].suites[0].specs[].tests[].results[].stdout[].text' "$file" | grep "Latest GitHub Release:" | cut -d: -f2 | xargs)
            ALL_CURRENT=$(jq -r '.suites[0].suites[0].specs[].tests[].results[].stdout[].text' "$file" | grep "All versions current:" | cut -d: -f2 | xargs)
            
            if [ -n "$LATEST_VERSION" ]; then
              echo "**Latest Version:** $LATEST_VERSION" >> $GITHUB_STEP_SUMMARY
            fi
            if [ -n "$ALL_CURRENT" ]; then
              echo "**Version Currency:** $ALL_CURRENT" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Extract download links and add OS info
            echo "**Download Links:**" >> $GITHUB_STEP_SUMMARY
            jq -r '.suites[0].suites[0].specs[].tests[].results[].stdout[].text' "$file" | \
            grep "Checking:" | grep -v ".asc" | \
            while read -r line; do
              filename=$(echo "$line" | sed -n 's/.*\/\([^/]*\)$/\1/p')
              
              # Determine OS from filename
              if echo "$filename" | grep -q "win64"; then
                OS="Windows x64"
              elif echo "$filename" | grep -q "x86_64-apple-darwin"; then
                OS="macOS Intel"
              elif echo "$filename" | grep -q "arm64-apple-darwin"; then
                OS="macOS ARM"
              elif echo "$filename" | grep -q "x86_64-linux-gnu"; then
                OS="Linux x64"
              elif echo "$filename" | grep -q "aarch64-linux-gnu"; then
                OS="Linux ARM64"
              else
                OS="Unknown"
              fi
              
              echo "- **$OS**: ✅" >> $GITHUB_STEP_SUMMARY
            done
            
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [ "$FAILED_TESTS" -gt 0 ]; then
              echo "### ❌ Failed Tests" >> $GITHUB_STEP_SUMMARY
              jq -r '.suites[].specs[] | select(.tests[].results[].status == "failed") | "- " + .title' "$file" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          fi
        done
        
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "*HTML reports available in artifacts*" >> $GITHUB_STEP_SUMMARY
