name: Dash Core Download Links Check

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to test with (chromium, firefox, webkit, all)'
        required: false
        default: 'all'
        type: choice
        options:
        - all
        - chromium
        - firefox
        - webkit
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ github.event.inputs.browser == 'all' && fromJSON('["chromium", "firefox", "webkit"]') || github.event.inputs.browser && fromJSON(format('["{0}"]', github.event.inputs.browser)) || fromJSON('["chromium", "firefox", "webkit"]') }}
    
    name: Test on ${{ matrix.browser }}
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Run Playwright tests
      run: npx playwright test --project=${{ matrix.browser }}
      env:
        CI: true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.browser }}
        path: test-results/
        retention-days: 30

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-html-report-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30

  report:
    if: always()
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Generate summary report
      run: |
        echo "# Dash Core Download Links Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
        
        # Count total test files
        TOTAL_REPORTS=$(find artifacts/ -name "results.json" | wc -l)
        echo "- Total browser configurations tested: $TOTAL_REPORTS" >> $GITHUB_STEP_SUMMARY
        
        # Process each results file
        for file in artifacts/*/results.json; do
          if [ -f "$file" ]; then
            BROWSER=$(echo "$file" | sed -n 's/.*playwright-report-\([^/]*\).*/\1/p')
            TOTAL_TESTS=$(jq '.stats.expected + .stats.unexpected + .stats.flaky' "$file")
            PASSED_TESTS=$(jq '.stats.expected' "$file")
            FAILED_TESTS=$(jq '.stats.unexpected' "$file")
            
            echo "### $BROWSER Results" >> $GITHUB_STEP_SUMMARY
            echo "- Total: $TOTAL_TESTS" >> $GITHUB_STEP_SUMMARY
            echo "- Passed: $PASSED_TESTS" >> $GITHUB_STEP_SUMMARY
            echo "- Failed: $FAILED_TESTS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [ "$FAILED_TESTS" -gt 0 ]; then
              echo "#### Failed Tests ($BROWSER)" >> $GITHUB_STEP_SUMMARY
              jq -r '.suites[].specs[] | select(.tests[].results[].status == "failed") | "- " + .title' "$file" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          fi
        done
        
        echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- HTML reports are available in the artifacts section" >> $GITHUB_STEP_SUMMARY
        echo "- JSON test results are included for programmatic processing" >> $GITHUB_STEP_SUMMARY

  notify-failure:
    if: failure() && github.event_name == 'schedule'
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: Create Issue on Failure
      uses: actions/github-script@v7
      with:
        script: |
          const title = `🚨 Dash Core Download Links Check Failed - ${new Date().toISOString().split('T')[0]}`;
          const body = `
          The scheduled Dash Core download links check has failed.
          
          **Workflow Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Date**: ${new Date().toISOString()}
          **Branch**: ${{ github.ref }}
          
          Please investigate the failing download links and update them as necessary.
          
          This issue was automatically created by the GitHub Actions workflow.
          `;
          
          // Check if there's already an open issue for today
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: ['automated', 'download-check', 'bug']
          });
          
          const today = new Date().toISOString().split('T')[0];
          const existingIssue = issues.data.find(issue => 
            issue.title.includes('Download Links Check Failed') && 
            issue.title.includes(today)
          );
          
          if (!existingIssue) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['automated', 'download-check', 'bug']
            });
          }
